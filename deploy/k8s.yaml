apiVersion: apps/v1
kind: Deployment
metadata: { name: webrecon, labels: { app: webrecon } }
spec:
  replicas: 1
  selector: { matchLabels: { app: webrecon } }
  template:
    metadata: { labels: { app: webrecon } }
    spec:
      containers:
        - name: webrecon
          image: ghcr.io/cognis-digital/webrecon:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: webrecon }
spec:
  selector: { app: webrecon }
  ports: [{ port: 80, targetPort: 8000 }]
